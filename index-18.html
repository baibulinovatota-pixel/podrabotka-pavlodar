  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Подработка рядом — Павлодар</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf8; color: #1a1a1a; }
    input, textarea, select { font-family: inherit; }
    .btn-orange { background: linear-gradient(135deg, #e8813a, #d4611f); color: white; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn-orange:active { transform: scale(0.97); opacity: 0.9; }
    .card { background: white; border-radius: 16px; border: 1px solid #f0ece6; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .input-field { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e0dbd4; font-size: 15px; outline: none; background: white; transition: border-color 0.2s; }

    .tag { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; border: none; transition: all 0.15s; }

    @media(min-width:600px) { .overlay { align-items: center; } .bottom-sheet { border-radius: 20px !important; max-width: 440px; } }
    .bottom-sheet { background: white; width: 100%; border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto; }

<script type="module">

import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyBNzMEcEN7xOKRWFyjjTF6M95SZcwtdh_w",
  authDomain: "podrabotka-pavlodar.firebaseapp.com",
  projectId: "podrabotka-pavlodar",
  storageBucket: "podrabotka-pavlodar.firebasestorage.app",
  messagingSenderId: "686968732860",
  appId: "1:686968732860:web:4121886aa221cd35cea4b9"
});
const db = getFirestore(app);
const storage = getStorage(app);
window.__fb = { db, storage, storageRef, uploadBytes, getDownloadURL, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp, doc, setDoc, getDoc, deleteDoc };

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const DISTRICTS = ["Все районы","Центр","Дачный","Усолка","Химгородки","Второй Павлодар","Диспетчерская","Кирпичный","Рабочий посёлок"];
const TELEGRAM_BOT_USERNAME = "podrabotka_pvl_codes_bot";
const {useState, useEffect, useRef} = React;
const h = React.createElement;

function genCode() {
  return String(Math.floor(100000 + Math.random()*900000));
}

function timeAgo(ts) {
  if (!ts || !ts.toMillis) return "Только что";
  const d = (Date.now() - ts.toMillis()) / 1000;
  if (d < 60) return "Только что";
  if (d < 3600) return Math.floor(d/60) + " мин. назад";
  if (d < 86400) return Math.floor(d/3600) + " ч. назад";
  return Math.floor(d/86400) + " дн. назад";
}

// ── AUTH ────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [step, setStep] = useState("form"); // form | verify
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [pending, setPending] = useState(null); // {uid, name, phone}
  const unsubRef = useRef(null);

const startRegistration = async () => {
    if (!name.trim()) return setError("Введите ваше имя");
    const raw = phone.replace(/\s/g,"");
    if (raw.length < 11) return setError("Введите номер: +7XXXXXXXXXX");
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, getDoc, serverTimestamp} = window.__fb;
      const uid = "user_" + raw;
      const ref = doc(db,"users",uid);
      const snap = await getDoc(ref);

      if (snap.exists() && snap.data().phoneVerified) {
        const savedName = (snap.data().name || "").trim().toLowerCase();
        if (savedName !== name.trim().toLowerCase()) {
          setError("Имя не совпадает с тем, что указано при регистрации");
          setLoading(false);
          return;
        }

        const newCode = genCode();
        await setDoc(doc(db,"verifyCodes",raw),{
          code:newCode,
          uid,
          used:false,
          createdAt:serverTimestamp(),
          expiresAt: Date.now() + 10*60*1000
        });

        setPending({uid, name:snap.data().name, phone:raw});
        setStep("verify");

        const {onSnapshot} = window.__fb;
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = onSnapshot(doc(db,"verifyCodes",raw), s=>{
          if (s.exists() && s.data().used) {
            onLogin({uid, name:snap.data().name, phone:raw, phoneVerified:true});
          }
        });
        setLoading(false);
        return;
      }

      if (!snap.exists()) {
        await setDoc(ref,{name:name.trim(),phone:raw,phoneVerified:false,createdAt:new Date()});
      } else {
        await setDoc(ref,{name:name.trim()},{merge:true});
      }

      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",raw),{
        code:newCode,
        uid,
        used:false,
        createdAt:serverTimestamp(),
        expiresAt: Date.now() + 10*60*1000
      });

      setPending({uid, name:name.trim(), phone:raw});
      setStep("verify");

      const {onSnapshot} = window.__fb;
      if (unsubRef.current) unsubRef.current();
      unsubRef.current = onSnapshot(ref, s=>{
        if (s.exists() && s.data().phoneVerified) {
          onLogin({uid, name:s.data().name||name.trim(), phone:raw, phoneVerified:true});
        }
      });
    } catch(e) {
      console.error(e);
      setError("Ошибка. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const checkCode = async () => {
    if (!pending) return;
    const entered = code.replace(/\s/g,"");
    if (entered.length !== 6) return setError("Введите 6-значный код");
    setError("");
    setLoading(true);
    try {
      const {db, doc, getDoc, setDoc} = window.__fb;
      const ref = doc(db,"verifyCodes",pending.phone);
      const snap = await getDoc(ref);
      if (!snap.exists()) { setError("Код не найден. Запросите новый."); setLoading(false); return; }
      const data = snap.data();
      if (data.used) { setError("Этот код уже использован."); setLoading(false); return; }
      if (Date.now() > data.expiresAt) { setError("Код истёк. Запросите новый."); setLoading(false); return; }
      if (data.code !== entered) { setError("Неверный код."); setLoading(false); return; }

      await setDoc(doc(db,"users",pending.uid),{phoneVerified:true},{merge:true});
      await setDoc(ref,{used:true},{merge:true});
      onLogin({uid:pending.uid, name:pending.name, phone:pending.phone, phoneVerified:true});
    } catch(e) {
      console.error(e);
      setError("Ошибка проверки. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const resendCode = async () => {
    if (!pending) return;
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, serverTimestamp} = window.__fb;
      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",pending.phone),{
        code:newCode, uid:pending.uid, used:false,
        createdAt:serverTimestamp(), expiresAt: Date.now() + 10*60*1000
      });
    } catch(e) { console.error(e); setError("Не удалось отправить код."); }
    setLoading(false);
  };

  const botLink = pending ? ("https://t.me/"+TELEGRAM_BOT_USERNAME+"?start="+pending.phone) : "#";

  if (step === "verify") {
    return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
      h('div',{style:{width:"100%",maxWidth:360}},
        h('div',{style:{textAlign:"center",marginBottom:24}},
          h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"✈️"),
          h('h1',{style:{fontSize:20,fontWeight:800}},"Подтвердите номер"),
          h('p',{style:{fontSize:13,color:"#888",marginTop:4}},pending && pending.phone)
        ),
        h('div',{className:"card",style:{padding:24}},
          h('div',{style:{background:"#fafaf8",border:"1px solid #f0ece6",borderRadius:12,padding:14,marginBottom:18}},
            h('div',{style:{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,textTransform:"uppercase"}},"Как получить код"),
            h('div',{style:{fontSize:13,color:"#555",lineHeight:1.8}},
              h('div',null,"1. Откройте Telegram-бота"),
              h('div',null,"2. Нажмите Старт"),
              h('div',null,"3. Бот пришлёт 6-значный код"),
              h('div',null,"4. Введите его ниже")
            )
          ),
          h('a',{
            href:botLink, target:"_blank", rel:"noopener", className:"btn-orange",
            style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:18,textDecoration:"none"}
          }, h('span',{style:{fontSize:20}},"✈️"), "Открыть Telegram-бота"),
          h('div',{style:{marginBottom:14}},
            h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Код из Telegram"),
            h('input',{className:"input-field",placeholder:"000000",value:code,inputMode:"numeric",maxLength:6,
              onChange:e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6)),
              style:{textAlign:"center",fontSize:22,fontWeight:800,letterSpacing:4}})
          ),
          error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
          h('button',{className:"btn-orange",onClick:checkCode,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:10,opacity:loading?0.7:1}},loading?"Проверяем...":"Подтвердить"),
          h('button',{onClick:resendCode,disabled:loading,style:{width:"100%",padding:12,borderRadius:12,border:"1px solid #e0dbd4",background:"white",fontSize:13,cursor:"pointer",marginBottom:8}},"Отправить код повторно"),
          h('button',{onClick:()=>{setStep("form");setError("");setCode("");if(unsubRef.current)unsubRef.current();},style:{width:"100%",padding:10,background:"none",border:"none",fontSize:13,color:"#aaa",cursor:"pointer"}},"← Изменить номер")
        )
      )
    );
  }

  return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
    h('div',{style:{width:"100%",maxWidth:360}},
      h('div',{style:{textAlign:"center",marginBottom:32}},
        h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"🌾"),
        h('h1',{style:{fontSize:22,fontWeight:800}},"Подработка рядом"),
        h('p',{style:{fontSize:13,color:"#888",marginTop:4}},"Бытовые задания · Павлодар")
      ),
      h('div',{className:"card",style:{padding:24}},
        h('h2',{style:{fontSize:17,fontWeight:700,marginBottom:20}},"Войти / Зарегистрироваться"),
        h('div',{style:{marginBottom:14}},
          h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Ваше имя"),
          h('input',{className:"input-field",placeholder:"Имя",value:name,onChange:e=>setName(e.target.value)})
        ),
        h('div',{style:{marginBottom:14}},
          h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Номер телефона"),
          h('input',{className:"input-field",placeholder:"+7 777 000 00 00",value:phone,onChange:e=>setPhone(e.target.value),type:"tel"})
        ),
        h('div',{style:{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7a5c00",marginBottom:16}},
          "⚠️ Встречайтесь только в людных местах. Не переводите деньги незнакомым людям заранее."
        ),
        error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
        h('button',{className:"btn-orange",onClick:startRegistration,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,opacity:loading?0.7:1}},loading?"Отправляем код...":"Продолжить →"),
        h('p',{style:{textAlign:"center",fontSize:12,color:"#aaa",marginTop:12}},"Регистрация бесплатная. Потребуется подтвердить номер в Telegram.")
      )
    )
  );
}

// ── TASK CARD ───────────────────────────────────────────
function TaskCard({task, onChat, onReport, onComplete, uid}) {
  const isOwn = task.authorUid === uid;
  const status = task.status || "open";
  const isAssignee = task.assigneeUid === uid;
  const canApply = !isOwn && status==="open";
  return h('div',{className:"card",style:{padding:16,marginBottom:12}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:8}},
      h('h3',{style:{fontWeight:700,fontSize:15,lineHeight:1.4,flex:1}},task.title),
      h('span',{style:{color:"#d4611f",fontWeight:800,fontSize:16,whiteSpace:"nowrap"}},(task.pay||0).toLocaleString("ru-RU")+" ₸")
    ),
    h('p',{className:"line-clamp2",style:{fontSize:13,color:"#666",lineHeight:1.5,marginBottom:12}},task.description),
    h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h('div',{style:{display:"flex",alignItems:"center",gap:8}},
        h('span',{style:{background:"#fef3e2",color:"#b3530d",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20}},"📍 "+task.district),
        h('span',{style:{fontSize:12,color:"#999"}},task.authorName),
        status==="in_progress" && h('span',{style:{fontSize:11,fontWeight:700,color:"#b3530d"}},"В работе")
      ),
      isOwn
        ? (status==="in_progress"
            ? h('button',{className:"btn-orange",onClick:()=>onComplete(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Работа выполнена")
            : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Ваше задание"))
        : (canApply
            ? h('div',{style:{display:"flex",gap:6}},
                h('button',{onClick:()=>onReport(task),style:{padding:"7px 10px",borderRadius:20,fontSize:11,background:"#f5f5f5",border:"none",cursor:"pointer",color:"#999"}},"🚩"),
                h('button',{className:"btn-orange",onClick:()=>onChat(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Написать")
              )
            : (isAssignee
                ? h('button',{className:"btn-orange",onClick:()=>onChat(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Чат")
                : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Занято")))
    ),
    h('div',{style:{marginTop:10,paddingTop:10,borderTop:"1px solid #f5f0ea"}},
      h('span',{style:{fontSize:11,color:"#bbb"}},timeAgo(task.createdAt))
    )
  );
}

// ── CHAT ────────────────────────────────────────────────
function ChatModal({task, user, onClose, otherUid, otherName}) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [liveTask, setLiveTask] = useState(task);
  const [myReview, setMyReview] = useState(undefined);
  const [reviewRating, setReviewRating] = useState("");
  const [reviewComment, setReviewComment] = useState("");
  const bottomRef = useRef(null);
  const posterUid = task.authorUid;
  const applicantUid = otherUid || user.uid;
  const chatId = [posterUid, applicantUid].sort().join("_")+"_"+task.id;
  const headerName = otherName || task.authorName;
  const isPosterView = user.uid===posterUid;

  useEffect(()=>{
    if(!task.id) return;
    const {db,doc,onSnapshot} = window.__fb;
    return onSnapshot(doc(db,"tasks",task.id), snap=>{
      if(snap.exists()) setLiveTask({id:snap.id,...snap.data()});
    });
  },[task.id]);

  useEffect(()=>{
    if(!task.id) { setMyReview(null); return; }
    const {db,doc,getDoc} = window.__fb;
    getDoc(doc(db,"reviews",task.id+"_"+user.uid)).then(s=>setMyReview(s.exists()?s.data():null)).catch(()=>setMyReview(null));
  },[task.id, user.uid]);

  useEffect(()=>{
    const {db,collection,query,orderBy,onSnapshot} = window.__fb;
    const q = query(collection(db,"chats",chatId,"messages"),orderBy("createdAt"));
    return onSnapshot(q, snap=>{
      setMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
      setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),100);
    });
  },[chatId]);

  const send = async()=>{
    if(!input.trim()) return;
    const text=input.trim(); setInput("");
    const {db,collection,addDoc,doc,setDoc,serverTimestamp} = window.__fb;
    await addDoc(collection(db,"chats",chatId,"messages"),{text,senderUid:user.uid,senderName:user.name,createdAt:serverTimestamp()});
    await setDoc(doc(db,"chatMeta",chatId),{
      taskId:task.id, taskTitle:task.title, taskPay:task.pay||0,
      posterUid, posterName:task.authorName,
      applicantUid, applicantName:(otherName&&otherUid)?otherName:user.name,
      participants:[posterUid,applicantUid],
      lastMessage:text, lastSenderUid:user.uid,
      updatedAt: serverTimestamp()
    },{merge:true});
  };

  const selectExecutor = async()=>{
    const {db,doc,setDoc} = window.__fb;
    await setDoc(doc(db,"tasks",task.id),{status:"in_progress",assigneeUid:applicantUid,assigneeName:headerName},{merge:true});
  };
  const completeWork = async()=>{
    const {db,doc,setDoc,serverTimestamp} = window.__fb;
    await setDoc(doc(db,"tasks",task.id),{status:"completed",completedAt:serverTimestamp()},{merge:true});
  };
  const submitReview = async(rating,score,comment)=>{
    const {db,doc,getDoc,setDoc,serverTimestamp} = window.__fb;
    const ref = doc(db,"reviews",task.id+"_"+user.uid);
    const exists = await getDoc(ref);
    if(exists.exists()) { setMyReview(exists.data()); return; }
    const targetUid = isPosterView ? applicantUid : posterUid;
    const targetName = isPosterView ? headerName : task.authorName;
    const data = {taskId:task.id,taskTitle:task.title,reviewerUid:user.uid,reviewerName:user.name,targetUid,targetName,role:isPosterView?"customer":"executor",rating,score,comment:comment||"",createdAt:serverTimestamp()};
    await setDoc(ref,data);
    setMyReview(data);
  };

  const status = liveTask.status || "open";
  const EXECUTOR_OPTS = [["paid_full","Заплатили полностью",5],["paid_part","Заплатили частично",3],["paid_no","Не заплатили",1]];
  const CUSTOMER_OPTS = [["work_good","Работа выполнена отлично",5],["work_ok","Работа выполнена нормально",3],["work_bad","Работа выполнена плохо",1]];
  const reviewOpts = isPosterView ? CUSTOMER_OPTS : EXECUTOR_OPTS;

  let actionPanel = null;
  if(isPosterView && status==="open"){
    actionPanel = h('div',{style:{padding:"10px 16px",borderBottom:"1px solid #f0ece6"}},
      h('button',{className:"btn-orange",onClick:selectExecutor,style:{width:"100%",padding:10,borderRadius:10,fontSize:13,fontWeight:700}},"Выбрать исполнителя")
    );
  } else if(isPosterView && status==="in_progress" && liveTask.assigneeUid===applicantUid){
    actionPanel = h('div',{style:{padding:"10px 16px",borderBottom:"1px solid #f0ece6"}},
      h('button',{className:"btn-orange",onClick:completeWork,style:{width:"100%",padding:10,borderRadius:10,fontSize:13,fontWeight:700}},"Работа выполнена")
    );
  } else if(!isPosterView && status==="in_progress" && liveTask.assigneeUid===user.uid){
    actionPanel = h('div',{style:{padding:"8px 16px",borderBottom:"1px solid #f0ece6",fontSize:12,color:"#7a5c00"}},"Вы выбраны исполнителем");
  } else if(status==="completed" && myReview!==undefined){
    actionPanel = myReview
      ? h('div',{style:{padding:"10px 16px",borderBottom:"1px solid #f0ece6",fontSize:12,color:"#7a5c00"}},"Отзыв отправлен")
      : h('div',{style:{padding:12,borderBottom:"1px solid #f0ece6"}},
          h('div',{style:{fontSize:13,fontWeight:700,marginBottom:8}},"Оставить отзыв"),
          h('div',{style:{display:"flex",flexDirection:"column",gap:6,marginBottom:8}},
            reviewOpts.map(([k,label])=>h('button',{key:k,onClick:()=>setReviewRating(k),style:{padding:"8px 12px",borderRadius:10,fontSize:13,textAlign:"left",border:reviewRating===k?"2px solid #e8813a":"1px solid #e0dbd4",background:reviewRating===k?"#fef3e2":"white",cursor:"pointer"}},label))
          ),

// ── CREATE ──────────────────────────────────────────────
function CreateTask({user, onBack, onDone}) {
  const [form, setForm] = useState({title:"",description:"",district:"Центр",pay:""});
  const [errors, setErrors] = useState({});
  const [showPay, setShowPay] = useState(false);
  const [loading, setLoading] = useState(false);
  const [receiptFile, setReceiptFile] = useState(null); // файл чека
  const [receiptPreview, setReceiptPreview] = useState(null); // превью

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const validate = () => {
    const e={};
    if(!form.title.trim()) e.title="Введите название";
    if(!form.description.trim()) e.description="Введите описание";
    if(!form.pay||isNaN(form.pay)||Number(form.pay)<=0) e.pay="Укажите сумму";
    setErrors(e); return Object.keys(e).length===0;
  };

  // Обработка выбора файла чека
  const onReceiptChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setReceiptFile(file);
    // Показываем превью если это картинка
    if (file.type.startsWith("image/")) {
      const reader = new FileReader();
      reader.onload = ev => setReceiptPreview(ev.target.result);
      reader.readAsDataURL(file);
    } else {
      setReceiptPreview(null);
    }
  };

  const publish = async () => {
    if (!receiptFile) {
      setErrors(e=>({...e, receipt:"Прикрепите фото/скрин чека оплаты"}));
      return;
    }
    setLoading(true);
    try {
      const {db, storage, storageRef, uploadBytes, getDownloadURL, collection, addDoc, serverTimestamp} = window.__fb;

      // 1. Загружаем чек в Firebase Storage → receipts/{uid}_{timestamp}_{filename}
      const path = `receipts/${user.uid}_${Date.now()}_${receiptFile.name}`;
      const fileRef = storageRef(storage, path);
      await uploadBytes(fileRef, receiptFile);
      const receiptUrl = await getDownloadURL(fileRef);

      // 2. Сохраняем задание со статусом pending_payment
      const docRef = await addDoc(collection(db,"tasks"), {
        ...form,
        pay: Number(form.pay),
        authorUid: user.uid,
        authorName: user.name,
        authorPhone: user.phone,
        receiptUrl,
        status: "pending_payment",
        createdAt: serverTimestamp()
      });

      // 3. Уведомляем модератора в Telegram с фото чека
      const taskId = docRef.id;
      const caption =
        "\u{1F4CB} Новое задание на модерации\n\n" +
        "Название: " + form.title + "\n" +
        "Описание: " + form.description + "\n" +
        "Район: " + form.district + "\n" +
        "Оплата: " + form.pay + " \u20B8\n" +
        "Автор: " + user.name + " (" + user.phone + ")\n\n" +
        "ID: " + taskId + "\n\n" +
        "Firebase Console -> tasks -> " + taskId + "\n" +
        "status: pending_payment -> open (опубликовать) / rejected (отклонить)";
      try {
        await fetch("https://api.telegram.org/bot8910813476:AAET6lE4eBSAUDLIeKG0sR94OwmDKbYh7cA/sendPhoto", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({chat_id:"7922008036", photo: receiptUrl, caption})
        });
      } catch(e){ console.error("tg error", e); }

      onDone();
    } catch(e) {
      console.error(e);
      setErrors(err=>({...err, publish:"Ошибка при публикации. Попробуйте ещё раз."}));
    }
    setLoading(false);
  };

  const field = (k,l,p,multi) => h('div',{style:{marginBottom:16}},
    h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},l),
    multi ? h('textarea',{className:"input-field",rows:4,placeholder:p,value:form[k],onChange:e=>set(k,e.target.value),style:{resize:"none"}})
          : h('input',{className:"input-field",placeholder:p,value:form[k],onChange:e=>set(k,e.target.value)}),
    errors[k] && h('p',{style:{fontSize:12,color:"#d32f2f",marginTop:4}},errors[k])
  );

  return h('div',{style:{minHeight:"100vh",background:"#fafaf8"}},
    h('div',{style:{position:"sticky",top:0,background:"white",borderBottom:"1px solid #f0ece6",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,zIndex:10}},
      h('button',{onClick:onBack,style:{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#555"}},"←"),
      h('span',{style:{fontWeight:800,fontSize:17}},"Новое задание")
    ),
    h('div',{style:{padding:16,maxWidth:480,margin:"0 auto",paddingBottom:40}},
      h('div',{style:{background:"#fef3e2",color:"#b3530d",padding:"12px 16px",borderRadius:12,fontSize:13,marginBottom:16}},
        "💳 Публикация стоит ",h('b',null,"500 ₸"),". Переведи на Kaspi: ",h('b',null,"+77768885877")," (Ернар) и прикрепи скриншот чека."
      ),
      h('div',{style:{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#7a5c00",marginBottom:20}},
        "⚠️ Запрещено: публиковать задания с целью обмана, мошенничества или угрозы безопасности. Нарушители будут заблокированы."
      ),
      field("title","Название задачи","Например: Покосить траву"),
      field("description","Описание","Что нужно сделать, инструменты, время...",true),
      h('div',{style:{marginBottom:16}},
        h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Район"),
        h('select',{className:"input-field",value:form.district,onChange:e=>set("district",e.target.value)},

        )
      ),
      h('div',{style:{marginBottom:24}},
        h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Оплата исполнителю (₸)"),
        h('input',{className:"input-field",type:"number",placeholder:"5000",value:form.pay,onChange:e=>set("pay",e.target.value)}),
        errors.pay && h('p',{style:{fontSize:12,color:"#d32f2f",marginTop:4}},errors.pay)
      ),

      h('div',{style:{marginBottom:24}},
        h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Скриншот чека оплаты (500 ₸)"),
        h('label',{style:{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",border:"2px dashed "+(receiptFile?"#e8813a":"#e0dbd4"),borderRadius:12,cursor:"pointer",background:receiptFile?"#fef3e2":"white",transition:"all 0.2s"}},
          h('span',{style:{fontSize:24}},receiptFile?"✅":"📎"),
          h('span',{style:{fontSize:13,color:receiptFile?"#b3530d":"#aaa"}},receiptFile?receiptFile.name:"Выбрать фото или PDF"),
          h('input',{type:"file",accept:"image/*,application/pdf",onChange:onReceiptChange,style:{display:"none"}})
        ),
        receiptPreview && h('img',{src:receiptPreview,style:{width:"100%",borderRadius:10,marginTop:10,maxHeight:200,objectFit:"cover"}}),
        errors.receipt && h('p',{style:{fontSize:12,color:"#d32f2f",marginTop:4}},errors.receipt)
      ),

      errors.publish && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"10px 14px",borderRadius:10,fontSize:13,marginBottom:12}},errors.publish),

      h('button',{className:"btn-orange",onClick:()=>validate()&&setShowPay(true),style:{width:"100%",padding:16,borderRadius:14,fontSize:16,fontWeight:800,boxShadow:"0 4px 20px rgba(212,97,31,0.35)"}},"Опубликовать за 500 ₸")

    showPay && h('div',{className:"overlay"},

          h('div',{style:{fontSize:40,marginBottom:8}},"🧾"),

function ChatsList({user, onOpen, onBack}) {
  const [chats, setChats] = useState([]);
  const lastOpenRef = useRef(0);
  const safeOpen = (c) => {
    const now = Date.now();
    if (now - lastOpenRef.current < 400) return;
    lastOpenRef.current = now;
    onOpen(c);
  };
  useEffect(()=>{
    const {db,collection,query,where,onSnapshot} = window.__fb;
    const q = query(collection(db,"chatMeta"), where("participants","array-contains",user.uid));
    return onSnapshot(q, snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      list.sort((a,b)=>((b.updatedAt&&b.updatedAt.toMillis)?b.updatedAt.toMillis():0)-((a.updatedAt&&a.updatedAt.toMillis)?a.updatedAt.toMillis():0));
      setChats(list);
    });
  },[]);

  return h('div',{style:{minHeight:"100vh",background:"#fafaf8"}},
    h('div',{style:{position:"sticky",top:0,background:"white",borderBottom:"1px solid #f0ece6",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,zIndex:10}},

    h('div',{style:{padding:"12px 16px 40px",maxWidth:600,margin:"0 auto"}},
      chats.length===0
        ? h('div',{style:{textAlign:"center",padding:"60px 0"}},

// ── PHONE VERIFY ─────────────────────────────────────────
function PhoneVerifyModal({user, onClose}) {
  const [checking, setChecking] = useState(false);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [verified, setVerified] = useState(false);
  const [code, setCode] = useState("");
  const [error, setError] = useState("");

  const sendCode = async () => {
    setSending(true);
    setError("");
    try {
      const {db, doc, setDoc, serverTimestamp} = window.__fb;
      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",user.phone),{
        code:newCode, uid:user.uid, used:false,
        createdAt:serverTimestamp(), expiresAt: Date.now() + 10*60*1000
      });
      setSent(true);
    } catch(e) {
      console.error(e);
      setError("Не удалось отправить код.");
    }
    setSending(false);
  };

  const checkCode = async () => {
    const entered = code.replace(/\s/g,"");
    if (entered.length !== 6) return setError("Введите 6-значный код");
    setChecking(true);
    setError("");
    try {
      const {db, doc, getDoc, setDoc} = window.__fb;
      const ref = doc(db,"verifyCodes",user.phone);
      const snap = await getDoc(ref);
      if (!snap.exists()) { setError("Код не найден. Отправьте новый."); setChecking(false); return; }
      const data = snap.data();
      if (data.used) { setError("Этот код уже использован."); setChecking(false); return; }
      if (Date.now() > data.expiresAt) { setError("Код истёк. Отправьте новый."); setChecking(false); return; }
      if (data.code !== entered) { setError("Неверный код."); setChecking(false); return; }

      await setDoc(doc(db,"users",user.uid),{phoneVerified:true},{merge:true});
      await setDoc(ref,{used:true},{merge:true});
      setVerified(true);
      const saved = JSON.parse(localStorage.getItem("user")||"{}");
      localStorage.setItem("user", JSON.stringify({...saved, phoneVerified:true}));
    } catch(e) {
      console.error(e);
      setError("Ошибка проверки. Попробуйте ещё раз.");
    }
    setChecking(false);
  };

  const botLink = "https://t.me/"+TELEGRAM_BOT_USERNAME+"?start="+user.phone;

  return h('div',{className:"overlay",onClick:onClose},
    h('div',{className:"bottom-sheet",style:{padding:24},onClick:e=>e.stopPropagation()},
      verified
        ? h('div',{style:{textAlign:"center",padding:"10px 0"}},
            h('div',{style:{fontSize:48,marginBottom:12}},"✅"),
            h('h3',{style:{fontSize:18,fontWeight:800,marginBottom:8}},"Телефон подтверждён!"),
            h('p',{style:{fontSize:13,color:"#888",marginBottom:16}},"Ваш номер привязан к аккаунту"),
            h('button',{className:"btn-orange",onClick:onClose,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700}},"Закрыть")
          )
        : h('div',null,
            h('h3',{style:{fontSize:18,fontWeight:800,marginBottom:4}},"Подтверждение телефона"),
            h('p',{style:{fontSize:13,color:"#888",marginBottom:20,lineHeight:1.5}},"Telegram-бот пришлёт 6-значный код. Это займёт 30 секунд."),

            !sent && h('button',{
              className:"btn-orange", onClick:sendCode, disabled:sending,
              style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:16,opacity:sending?0.7:1}
            }, sending?"Отправляем...":"Отправить код"),

            sent && h('a',{
              href:botLink, target:"_blank", rel:"noopener", className:"btn-orange",
              style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:16,textDecoration:"none"}
            }, h('span',{style:{fontSize:20}},"✈️"), "Открыть Telegram-бота"),

            h('div',{style:{background:"#fafaf8",border:"1px solid #f0ece6",borderRadius:12,padding:14,marginBottom:16}},
              h('div',{style:{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,textTransform:"uppercase"}},"Как подтвердить"),
              h('div',{style:{fontSize:13,color:"#555",lineHeight:1.8}},
                h('div',null,"1. Нажмите «Отправить код»"),
                h('div',null,"2. Откройте Telegram-бота и нажмите Старт"),
                h('div',null,"3. Введите присланный код ниже")
              )
            ),

            sent && h('div',{style:{marginBottom:14}},
              h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Код из Telegram"),
              h('input',{className:"input-field",placeholder:"000000",value:code,inputMode:"numeric",maxLength:6,
                onChange:e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6)),
                style:{textAlign:"center",fontSize:22,fontWeight:800,letterSpacing:4}})
            ),

            error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"10px 14px",borderRadius:10,fontSize:13,marginBottom:12}},error),

            sent && h('button',{
              className:"btn-orange",
              onClick:checkCode,
              disabled:checking,
              style:{width:"100%",padding:13,borderRadius:12,fontSize:14,fontWeight:700,marginBottom:10,opacity:checking?0.7:1}
            },checking?"Проверяем...":"Подтвердить"),

            h('button',{onClick:onClose,style:{width:"100%",padding:12,borderRadius:12,border:"1px solid #e0dbd4",background:"white",fontSize:14,cursor:"pointer"}},"Закрыть")
          )
    )
  );
}

// ── PROFILE ──────────────────────────────────────────────
function ProfileScreen({user, onBack}) {
  const [reviews, setReviews] = useState([]);
  const [completed, setCompleted] = useState(0);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    const {db,collection,query,where,onSnapshot} = window.__fb;
    const q = query(collection(db,"reviews"), where("targetUid","==",user.uid));
    const unsub = onSnapshot(q, snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      list.sort((a,b)=>((b.createdAt&&b.createdAt.toMillis)?b.createdAt.toMillis():0)-((a.createdAt&&a.createdAt.toMillis)?a.createdAt.toMillis():0));
      setReviews(list);
      setLoading(false);
    });
    return unsub;
  },[user.uid]);

  useEffect(()=>{
    const {db,collection,query,where,onSnapshot} = window.__fb;
    const q1 = query(collection(db,"tasks"), where("authorUid","==",user.uid), where("status","==","completed"));
    const q2 = query(collection(db,"tasks"), where("assigneeUid","==",user.uid), where("status","==","completed"));
    const ids = new Set();
    const recalc = () => setCompleted(ids.size);
    const u1 = onSnapshot(q1, snap=>{ snap.docs.forEach(d=>ids.add(d.id)); recalc(); });
    const u2 = onSnapshot(q2, snap=>{ snap.docs.forEach(d=>ids.add(d.id)); recalc(); });
    return ()=>{u1();u2();};
  },[user.uid]);

  const avg = reviews.length ? (reviews.reduce((s,r)=>s+(r.score||0),0)/reviews.length) : 0;

  return h('div',{style:{minHeight:"100vh",background:"#fafaf8"}},
    h('div',{style:{position:"sticky",top:0,background:"white",borderBottom:"1px solid #f0ece6",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,zIndex:10}},
      h('button',{onClick:onBack,style:{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#555"}},"←"),
      h('span',{style:{fontWeight:800,fontSize:17}},"Профиль")
    ),
    h('div',{style:{padding:"16px 16px 40px",maxWidth:600,margin:"0 auto"}},
      h('div',{className:"card",style:{padding:18,marginBottom:16}},
        h('div',{style:{fontWeight:800,fontSize:17,marginBottom:4}},user.name),
        h('div',{style:{fontSize:13,color:"#888",marginBottom:12}},user.phone),
        h('div',{style:{display:"flex",gap:20}},
          h('div',null,
            h('div',{style:{fontSize:20,fontWeight:800,color:"#d4611f"}},reviews.length?avg.toFixed(1):"—"),
            h('div',{style:{fontSize:11,color:"#999"}},"Рейтинг ("+reviews.length+")")
          ),
          h('div',null,
            h('div',{style:{fontSize:20,fontWeight:800,color:"#d4611f"}},completed),
            h('div',{style:{fontSize:11,color:"#999"}},"Завершено работ")
          )
        )
      ),
      h('div',{style:{fontWeight:700,fontSize:14,marginBottom:10}},"Отзывы"),
      loading ? h('p',{style:{fontSize:13,color:"#aaa"}},"Загрузка...")
      : reviews.length===0 ? h('p',{style:{fontSize:13,color:"#aaa"}},"Пока нет отзывов")
      : reviews.map(r=>h('div',{key:r.id,className:"card",style:{padding:14,marginBottom:10}},
          h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
            h('span',{style:{fontWeight:700,fontSize:13}},r.reviewerName),
            h('span',{style:{fontSize:11,color:"#bbb"}},timeAgo(r.createdAt))
          ),
          h('div',{style:{fontSize:13,color:"#b3530d",marginBottom:4}},r.rating),
          r.comment && h('div',{style:{fontSize:13,color:"#666"}},r.comment)
        ))
    )
  );
}

// ── FEED ────────────────────────────────────────────────
function Feed({user}) {
  const [tasks, setTasks] = useState([]);
  const [district, setDistrict] = useState("Все районы");
  const [screen, setScreen] = useState("feed");
  const [chatTask, setChatTask] = useState(null);
  const [reportTask, setReportTask] = useState(null);
  const [showVerify, setShowVerify] = useState(false);
  const cleanedRef = useRef(new Set());

  useEffect(()=>{
    const {db,collection,query,orderBy,onSnapshot,doc,deleteDoc} = window.__fb;
    const q = query(collection(db,"tasks"),orderBy("createdAt","desc"));
    return onSnapshot(q, snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      setTasks(list);
      const now = Date.now();
      list.forEach(t=>{
        if(t.status==="completed" && t.completedAt && t.completedAt.toMillis && !cleanedRef.current.has(t.id)){
          if(now - t.completedAt.toMillis() > 24*3600*1000){
            cleanedRef.current.add(t.id);
            deleteDoc(doc(db,"tasks",t.id)).catch(()=>{});
          }
        }
      });
    });
  },[]);

  const filtered = (district==="Все районы" ? tasks : tasks.filter(t=>t.district===district)).filter(t=>t.status!=="completed" && t.status!=="pending_payment" && t.status!=="rejected");

  const openChatFromMeta = async (c) => {
    let data = {...c};
    if(!data.taskId || !data.posterUid || !data.applicantUid || !data.taskTitle || !data.posterName){
      try {
        const {db,doc,getDoc} = window.__fb;
        if(data.taskId){
          const snap = await getDoc(doc(db,"tasks",data.taskId));
          if(snap.exists()){
            const t = snap.data();
            data.taskTitle = data.taskTitle || t.title;
            data.taskPay = data.taskPay || t.pay;
            data.posterUid = data.posterUid || t.authorUid;
            data.posterName = data.posterName || t.authorName;
          }
        }
      } catch(e){ console.error(e); }
    }
    const isPoster = data.posterUid===user.uid;
    const task = {id:data.taskId, title:data.taskTitle||"Задание", pay:data.taskPay||0, authorUid:data.posterUid, authorName:data.posterName||"Пользователь"};
    if(isPoster) setChatTask({task, otherUid:data.applicantUid, otherName:data.applicantName||"Пользователь"});
    else setChatTask({task});
  };

  if(screen==="create") return h(CreateTask,{user,onBack:()=>setScreen("feed"),onDone:()=>setScreen("feed")});
  if(screen==="chats") return h(ChatsList,{user,onBack:()=>setScreen("feed"),onOpen:openChatFromMeta});
  if(screen==="profile") return h(ProfileScreen,{user,onBack:()=>setScreen("feed")});

  return h('div',{style:{minHeight:"100vh",background:"#fafaf8"}},
    h('div',{style:{position:"sticky",top:0,background:"white",borderBottom:"1px solid #f0ece6",zIndex:10}},
      h('div',{style:{padding:"14px 16px 10px",maxWidth:600,margin:"0 auto"}},
        h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          h('div',null,
            h('h1',{style:{fontSize:20,fontWeight:900,letterSpacing:"-0.5px"}},"Подработка рядом"),
            h('p',{style:{fontSize:12,color:"#aaa"}},"Павлодар · "+user.name),
            user.phoneVerified
              ? h('span',{style:{fontSize:11,color:"#2e7d32",fontWeight:700}},"Телефон подтвержден")
              : h('span',{onClick:()=>setShowVerify(true),style:{fontSize:11,color:"#d4611f",fontWeight:700,cursor:"pointer",textDecoration:"underline"}},"Подтвердить телефон")
          ),
          h('div',{style:{display:"flex",gap:8}},
            h('button',{className:"btn-orange",onClick:()=>setScreen("create"),style:{padding:"8px 16px",borderRadius:20,fontSize:13,fontWeight:700,boxShadow:"0 2px 10px rgba(212,97,31,0.3)"}},"+ Создать"),
            h('button',{onClick:()=>setScreen("chats"),style:{padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:700,background:"#f0ece6",border:"none",cursor:"pointer",color:"#6b5a46"}},"💬 Чаты"),
            h('button',{onClick:()=>setScreen("profile"),style:{padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:700,background:"#f0ece6",border:"none",cursor:"pointer",color:"#6b5a46"}},"Профиль")
          )
        ),
        h('div',{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}},
          DISTRICTS.map(d=>h('button',{key:d,className:"tag",onClick:()=>setDistrict(d),
            style:{background:district===d?"linear-gradient(135deg,#e8813a,#d4611f)":"#f0ece6",color:district===d?"white":"#6b5a46"}},d))
        )
      )
    ),
    h('div',{style:{padding:"12px 16px 8px",maxWidth:600,margin:"0 auto"}},
      h('div',{style:{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7a5c00"}},
        "⚠️ Встречайтесь только в людных местах. Не переводите деньги незнакомым заранее. При подозрении — нажмите 🚩"
      )
    ),
    h('div',{style:{padding:"8px 16px 40px",maxWidth:600,margin:"0 auto"}},
      filtered.length===0
        ? h('div',{style:{textAlign:"center",padding:"60px 0"}},
            h('div',{style:{fontSize:48,marginBottom:12}},"🌾"),
            h('p',{style:{fontSize:16,color:"#999",fontWeight:600}},"В этом районе пока нет заданий"),
            h('p',{style:{fontSize:13,color:"#bbb",marginTop:4}},"Создайте первым!")
          )
        : filtered.map(t=>h(TaskCard,{key:t.id,task:t,onChat:tk=>setChatTask({task:tk}),onReport:setReportTask,onComplete:tk=>setChatTask({task:tk,otherUid:tk.assigneeUid,otherName:tk.assigneeName}),uid:user.uid}))
    ),
    chatTask && h(ChatModal,{task:chatTask.task,user,onClose:()=>setChatTask(null),otherUid:chatTask.otherUid,otherName:chatTask.otherName}),
    reportTask && h(ReportModal,{task:reportTask,user,onClose:()=>setReportTask(null)}),
    showVerify && h(PhoneVerifyModal,{user,onClose:()=>setShowVerify(false)})
  );
}

// ── APP ─────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(()=>{
    const init = () => {
      const saved = localStorage.getItem("user");
      if(saved) setUser(JSON.parse(saved));
      setReady(true);
    };
    if(window.__fbReady) init();
    else window.addEventListener('fbready', init, {once:true});
  },[]);

  useEffect(()=>{
    if(!user || !window.__fbReady) return;
    const {db,doc,onSnapshot} = window.__fb;
    return onSnapshot(doc(db,"users",user.uid), snap=>{
      if(!snap.exists()) return;
      const d = snap.data();
      const updated = {uid:user.uid, name:d.name||user.name, phone:d.phone||user.phone, phoneVerified:!!d.phoneVerified};
      localStorage.setItem("user", JSON.stringify(updated));
      setUser(prev=>({...prev, phoneVerified:updated.phoneVerified, name:updated.name}));
    });
  },[user&&user.uid]);

  const login = (u) => {
    localStorage.setItem("user", JSON.stringify(u));
    setUser(u);
  };

  if(!ready) return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
    h('div',{style:{textAlign:"center"}},h('div',{style:{fontSize:48,marginBottom:12}},"🌾"),h('p',{style:{color:"#e8813a",fontWeight:700,fontSize:16}},"Загрузка..."))
  );
  if(!user) return h(AuthScreen,{onLogin:login});
  return h(Feed,{user});
}

ReactDOM.createRoot(document.getElementById("app-container")).render(h(App,null));
</script>
</body>
