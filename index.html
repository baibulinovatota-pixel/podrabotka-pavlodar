<script>
const DISTRICTS = ["Все районы","Центр","Дачный","Усолка","Химгородки","Второй Павлодар","Диспетчерская","Кирпичный","Рабочий посёлок"];
const TELEGRAM_BOT_USERNAME = "podrabotka_pvl_codes_bot";
const {useState, useEffect, useRef} = React;
const h = React.createElement;

function genCode() {
  return String(Math.floor(100000 + Math.random()*900000));
}

function timeAgo(ts) {
  if (!ts || !ts.toMillis) return "Только что";
  const d = (Date.now() - ts.toMillis()) / 1000;
  if (d < 60) return "Только что";
  if (d < 3600) return Math.floor(d/60) + " мин. назад";
  if (d < 86400) return Math.floor(d/3600) + " ч. назад";
  return Math.floor(d/86400) + " дн. назад";
}

// ── AUTH ────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [step, setStep] = useState("form"); // form | verify
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [pending, setPending] = useState(null); // {uid, name, phone}
  const unsubRef = useRef(null);

const startRegistration = async () => {
    if (!name.trim()) return setError("Введите ваше имя");
    const raw = phone.replace(/\s/g,"");
    if (raw.length < 11) return setError("Введите номер: +7XXXXXXXXXX");
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, getDoc, serverTimestamp} = window.__fb;
      const uid = "user_" + raw;
      const ref = doc(db,"users",uid);
      const snap = await getDoc(ref);

      if (snap.exists() && snap.data().phoneVerified) {
        const savedName = (snap.data().name || "").trim().toLowerCase();
        if (savedName !== name.trim().toLowerCase()) {
          setError("Имя не совпадает с тем, что указано при регистрации");
          setLoading(false);
          return;
        }

        const newCode = genCode();
        await setDoc(doc(db,"verifyCodes",raw),{
          code:newCode,
          uid,
          used:false,
          createdAt:serverTimestamp(),
          expiresAt: Date.now() + 10*60*1000
        });

        setPending({uid, name:snap.data().name, phone:raw});
        setStep("verify");

        const {onSnapshot} = window.__fb;
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = onSnapshot(doc(db,"verifyCodes",raw), s=>{
          if (s.exists() && s.data().used) {
            onLogin({uid, name:snap.data().name, phone:raw, phoneVerified:true});
          }
        });
        setLoading(false);
        return;
      }

      if (!snap.exists()) {
        await setDoc(ref,{name:name.trim(),phone:raw,phoneVerified:false,createdAt:new Date()});
      } else {
        await setDoc(ref,{name:name.trim()},{merge:true});
      }

      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",raw),{
        code:newCode,
        uid,
        used:false,
        createdAt:serverTimestamp(),
        expiresAt: Date.now() + 10*60*1000
      });

      setPending({uid, name:name.trim(), phone:raw});
      setStep("verify");

      const {onSnapshot} = window.__fb;
      if (unsubRef.current) unsubRef.current();
      unsubRef.current = onSnapshot(ref, s=>{
        if (s.exists() && s.data().phoneVerified) {
          onLogin({uid, name:s.data().name||name.trim(), phone:raw, phoneVerified:true});
        }
      });
    } catch(e) {
      console.error(e);
      setError("Ошибка. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const checkCode = async () => {
    if (!pending) return;
    const entered = code.replace(/\s/g,"");
    if (entered.length !== 6) return setError("Введите 6-значный код");
    setError("");
    setLoading(true);
    try {
      const {db, doc, getDoc, setDoc} = window.__fb;
      const ref = doc(db,"verifyCodes",pending.phone);
      const snap = await getDoc(ref);
      if (!snap.exists()) { setError("Код не найден. Запросите новый."); setLoading(false); return; }
      const data = snap.data();
      if (data.used) { setError("Этот код уже использован."); setLoading(false); return; }
      if (Date.now() > data.expiresAt) { setError("Код истёк. Запросите новый."); setLoading(false); return; }
      if (data.code !== entered) { setError("Неверный код."); setLoading(false); return; }

      await setDoc(doc(db,"users",pending.uid),{phoneVerified:true},{merge:true});
      await setDoc(ref,{used:true},{merge:true});
      onLogin({uid:pending.uid, name:pending.name, phone:pending.phone, phoneVerified:true});
    } catch(e) {
      console.error(e);
      setError("Ошибка проверки. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const resendCode = async () => {
    if (!pending) return;
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, serverTimestamp} = window.__fb;
      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",pending.phone),{
        code:newCode, uid:pending.uid, used:false,
        createdAt:serverTimestamp(), expiresAt: Date.now() + 10*60*1000
      });
    } catch(e) { console.error(e); setError("Не удалось отправить код."); }
    setLoading(false);
  };

  const botLink = pending ? ("https://t.me/"+TELEGRAM_BOT_USERNAME+"?start="+pending.phone) : "#";

  if (step === "verify") {
    return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
      h('div',{style:{width:"100%",maxWidth:360}},
        h('div',{style:{textAlign:"center",marginBottom:24}},
          h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"✈️"),
          h('h1',{style:{fontSize:20,fontWeight:800}},"Подтвердите номер"),
          h('p',{style:{fontSize:13,color:"#888",marginTop:4}},pending && pending.phone)
        ),
        h('div',{className:"card",style:{padding:24}},
          h('div',{style:{background:"#fafaf8",border:"1px solid #f0ece6",borderRadius:12,padding:14,marginBottom:18}},
            h('div',{style:{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,textTransform:"uppercase"}},"Как получить код"),
            h('div',{style:{fontSize:13,color:"#555",lineHeight:1.8}},
              h('div',null,"1. Откройте Telegram-бота"),
              h('div',null,"2. Нажмите Старт"),
              h('div',null,"3. Бот пришлёт 6-значный код"),
              h('div',null,"4. Введите его ниже")
            )
          ),
          h('a',{
            href:botLink, target:"_blank", rel:"noopener", className:"btn-orange",
            style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:18,textDecoration:"none"}
          }, h('span',{style:{fontSize:20}},"✈️"), "Открыть Telegram-бота"),
          h('div',{style:{marginBottom:14}},
            h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Код из Telegram"),
            h('input',{className:"input-field",placeholder:"000000",value:code,inputMode:"numeric",maxLength:6,
              onChange:e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6)),
              style:{textAlign:"center",fontSize:22,fontWeight:800,letterSpacing:4}})
          ),
          error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
          h('button',{className:"btn-orange",onClick:checkCode,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:10,opacity:loading?0.7:1}},loading?"Проверяем...":"Подтвердить"),
          h('button',{onClick:resendCode,disabled:loading,style:{width:"100%",padding:12,borderRadius:12,border:"1px solid #e0dbd4",background:"white",fontSize:13,cursor:"pointer",marginBottom:8}},"Отправить код повторно"),
          h('button',{onClick:()=>{setStep("form");setError("");setCode("");if(unsubRef.current)unsubRef.current();},style:{width:"100%",padding:10,background:"none",border:"none",fontSize:13,color:"#aaa",cursor:"pointer"}},"← Изменить номер")
        )
      )
    );
  }

  return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
    h('div',{style:{width:"100%",maxWidth:360}},
      h('div',{style:{textAlign:"center",marginBottom:32}},
        h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"🌾"),
        h('h1',{style:{fontSize:22,fontWeight:800}},"Подработка рядом"),
        h('p',{style:{fontSize:13,color:"#888",marginTop:4}},"Бытовые задания · Павлодар")
      ),
      h('div',{className:"card",style:{padding:24}},
        h('h2',{style:{fontSize:17,fontWeight:700,marginBottom:20}},"Войти / Зарегистрироваться"),
        h('div',{style:{marginBottom:14}},
          h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Ваше имя"),
          h('input',{className:"input-field",placeholder:"Имя",value:name,onChange:e=>setName(e.target.value)})
        ),
        h('div',{style:{marginBottom:14}},
          h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Номер телефона"),
          h('input',{className:"input-field",placeholder:"+7 777 000 00 00",value:phone,onChange:e=>setPhone(e.target.value),type:"tel"})
        ),
        h('div',{style:{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7a5c00",marginBottom:16}},
          "⚠️ Встречайтесь только в людных местах. Не переводите деньги незнакомым людям заранее."
        ),
        error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
        h('button',{className:"btn-orange",onClick:startRegistration,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,opacity:loading?0.7:1}},loading?"Отправляем код...":"Продолжить →"),
        h('p',{style:{textAlign:"center",fontSize:12,color:"#aaa",marginTop:12}},"Регистрация бесплатная. Потребуется подтвердить номер в Telegram.")
      )
    )
  );
}

// ── TASK CARD ───────────────────────────────────────────
function TaskCard({task, onChat, onReport, onComplete, uid}) {
  const isOwn = task.authorUid === uid;
  const status = task.status || "open";
  const isAssignee = task.assigneeUid === uid;
  const canApply = !isOwn && status==="open";
  return h('div',{className:"card",style:{padding:16,marginBottom:12}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:8}},
      h('h3',{style:{fontWeight:700,fontSize:15,lineHeight:1.4,flex:1}},task.title),
      h('span',{style:{color:"#d4611f",fontWeight:800,fontSize:16,whiteSpace:"nowrap"}},(task.pay||0).toLocaleString("ru-RU")+" ₸")
    ),
    h('p',{className:"line-clamp2",style:{fontSize:13,color:"#666",lineHeight:1.5,marginBottom:12}},task.description),
    h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h('div',{style:{display:"flex",alignItems:"center",gap:8}},
        h('span',{style:{background:"#fef3e2",color:"#b3530d",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20}},"📍 "+task.district),
        h('span',{style:{fontSize:12,color:"#999"}},task.authorName),
        status==="in_progress" && h('span',{style:{fontSize:11,fontWeight:700,color:"#b3530d"}},"В работе")
      ),
      isOwn
        ? (status==="in_progress"
            ? h('button',{className:"btn-orange",onClick:()=>onComplete(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Работа выполнена")
            : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Ваше задание"))
        : (canApply
            ? h('div',{style:{display:"flex",gap:6}},
                h('button',{onClick:()=>onReport(task),style:{padding:"7px 10px",borderRadius:20,fontSize:11,background:"#f5f5f5",border:"none",cursor:"pointer",color:"#999"}},"🚩"),
                h('button',{className:"btn-orange",onClick:()=>onChat(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Написать")
              )
            : (isAssignee
                ? h('button',{className:"btn-orange",onClick:()=>onChat(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Чат")
                : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Занято")))
    ),
    h('div',{style:{marginTop:10,paddingTop:10,borderTop:"1px solid #f5f0ea"}},
      h('span',{style:{fontSize:11,color:"#bbb"}},timeAgo(task.createdAt))
    )
  );
}

    const targetUid = isPosterView ? applicantUid : posterUid;

    if (!name.trim()) return setError("Введите ваше имя");
    const raw = phone.replace(/\s/g,"");
    if (raw.length < 11) return setError("Введите номер: +7XXXXXXXXXX");
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, getDoc, serverTimestamp} = window.__fb;
      const uid = "user_" + raw;
      const ref = doc(db,"users",uid);
      const snap = await getDoc(ref);

      if (snap.exists() && snap.data().phoneVerified) {
        const savedName = (snap.data().name || "").trim().toLowerCase();
        if (savedName !== name.trim().toLowerCase()) {
          setError("Имя не совпадает с тем, что указано при регистрации");
          setLoading(false);
          return;
        }

        const newCode = genCode();
        await setDoc(doc(db,"verifyCodes",raw),{
          code:newCode,
          uid,
          used:false,
          createdAt:serverTimestamp(),
          expiresAt: Date.now() + 10*60*1000
        });

        setPending({uid, name:snap.data().name, phone:raw});
        setStep("verify");

        const {onSnapshot} = window.__fb;
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = onSnapshot(doc(db,"verifyCodes",raw), s=>{
          if (s.exists() && s.data().used) {
            onLogin({uid, name:snap.data().name, phone:raw, phoneVerified:true});
          }
        });
        setLoading(false);
        return;
      }

      if (!snap.exists()) {
        await setDoc(ref,{name:name.trim(),phone:raw,phoneVerified:false,createdAt:new Date()});
      } else {
        await setDoc(ref,{name:name.trim()},{merge:true});
      }

      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",raw),{
        code:newCode,
        uid,
        used:false,
        createdAt:serverTimestamp(),
        expiresAt: Date.now() + 10*60*1000
      });

      setPending({uid, name:name.trim(), phone:raw});
      setStep("verify");

      const {onSnapshot} = window.__fb;
      if (unsubRef.current) unsubRef.current();
      unsubRef.current = onSnapshot(ref, s=>{
        if (s.exists() && s.data().phoneVerified) {
          onLogin({uid, name:s.data().name||name.trim(), phone:raw, phoneVerified:true});
        }
      });
    } catch(e) {
      console.error(e);
      setError("Ошибка. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const checkCode = async () => {
    if (!pending) return;
    const entered = code.replace(/\s/g,"");
    if (entered.length !== 6) return setError("Введите 6-значный код");
    setError("");
    setLoading(true);
    try {
      const {db, doc, getDoc, setDoc} = window.__fb;
      const ref = doc(db,"verifyCodes",pending.phone);
      const snap = await getDoc(ref);
      if (!snap.exists()) { setError("Код не найден. Запросите новый."); setLoading(false); return; }
      const data = snap.data();

      if (Date.now() > data.expiresAt) { setError("Код истёк. Запросите новый."); setLoading(false); return; }
      if (data.code !== entered) { setError("Неверный код."); setLoading(false); return; }

      await setDoc(doc(db,"users",pending.uid),{phoneVerified:true},{merge:true});
      await setDoc(ref,{used:true},{merge:true});
      onLogin({uid:pending.uid, name:pending.name, phone:pending.phone, phoneVerified:true});

    } catch(e) { console.error(e); setError("Не удалось отправить код."); }
    setLoading(false);
  };

      h('div',{style:{width:"100%",maxWidth:360}},
        h('div',{style:{textAlign:"center",marginBottom:24}},
          h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"✈️"),
          h('h1',{style:{fontSize:20,fontWeight:800}},"Подтвердите номер"),
          h('p',{style:{fontSize:13,color:"#888",marginTop:4}},pending && pending.phone)
        ),
        h('div',{className:"card",style:{padding:24}},
          h('div',{style:{background:"#fafaf8",border:"1px solid #f0ece6",borderRadius:12,padding:14,marginBottom:18}},
            h('div',{style:{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,textTransform:"uppercase"}},"Как получить код"),
            h('div',{style:{fontSize:13,color:"#555",lineHeight:1.8}},
              h('div',null,"1. Откройте Telegram-бота"),
              h('div',null,"2. Нажмите Старт"),
              h('div',null,"3. Бот пришлёт 6-значный код"),
              h('div',null,"4. Введите его ниже")
            )
          ),
          h('a',{
            href:botLink, target:"_blank", rel:"noopener", className:"btn-orange",

          }, h('span',{style:{fontSize:20}},"✈️"), "Открыть Telegram-бота"),
          h('div',{style:{marginBottom:14}},
            h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Код из Telegram"),
            h('input',{className:"input-field",placeholder:"000000",value:code,inputMode:"numeric",maxLength:6,
              onChange:e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6)),
              style:{textAlign:"center",fontSize:22,fontWeight:800,letterSpacing:4}})
          ),
          error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
          h('button',{className:"btn-orange",onClick:checkCode,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:10,opacity:loading?0.7:1}},loading?"Проверяем...":"Подтвердить"),

      ),

            : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Ваше задание"))
        : (canApply
            ? h('div',{style:{display:"flex",gap:6}},

      h('span',{style:{fontSize:11,color:"#bbb"}},timeAgo(task.createdAt))

    if (!name.trim()) return setError("Введите ваше имя");
    const raw = phone.replace(/\s/g,"");
    if (raw.length < 11) return setError("Введите номер: +7XXXXXXXXXX");
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, getDoc, serverTimestamp} = window.__fb;
      const uid = "user_" + raw;
      const ref = doc(db,"users",uid);
      const snap = await getDoc(ref);

      if (snap.exists() && snap.data().phoneVerified) {
        const savedName = (snap.data().name || "").trim().toLowerCase();
        if (savedName !== name.trim().toLowerCase()) {
          setError("Имя не совпадает с тем, что указано при регистрации");
          setLoading(false);
          return;
        }

        const newCode = genCode();
        await setDoc(doc(db,"verifyCodes",raw),{
          code:newCode,
          uid,
          used:false,
          createdAt:serverTimestamp(),
          expiresAt: Date.now() + 10*60*1000
        });

        setPending({uid, name:snap.data().name, phone:raw});
        setStep("verify");

        const {onSnapshot} = window.__fb;
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = onSnapshot(doc(db,"verifyCodes",raw), s=>{
          if (s.exists() && s.data().used) {
            onLogin({uid, name:snap.data().name, phone:raw, phoneVerified:true});
          }
        });
        setLoading(false);
        return;
      }

      if (!snap.exists()) {
        await setDoc(ref,{name:name.trim(),phone:raw,phoneVerified:false,createdAt:new Date()});
      } else {
        await setDoc(ref,{name:name.trim()},{merge:true});
      }

      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",raw),{
        code:newCode,
        uid,
        used:false,
        createdAt:serverTimestamp(),
        expiresAt: Date.now() + 10*60*1000
      });

      setPending({uid, name:name.trim(), phone:raw});
      setStep("verify");

      const {onSnapshot} = window.__fb;
      if (unsubRef.current) unsubRef.current();
      unsubRef.current = onSnapshot(ref, s=>{
        if (s.exists() && s.data().phoneVerified) {
          onLogin({uid, name:s.data().name||name.trim(), phone:raw, phoneVerified:true});
        }
      });
    } catch(e) {
      console.error(e);
      setError("Ошибка. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const checkCode = async () => {
    if (!pending) return;
    const entered = code.replace(/\s/g,"");
    if (entered.length !== 6) return setError("Введите 6-значный код");
    setError("");
    setLoading(true);
    try {
      const {db, doc, getDoc, setDoc} = window.__fb;
      const ref = doc(db,"verifyCodes",pending.phone);
      const snap = await getDoc(ref);
      if (!snap.exists()) { setError("Код не найден. Запросите новый."); setLoading(false); return; }
      const data = snap.data();
      if (data.used) { setError("Этот код уже использован."); setLoading(false); return; }
      if (Date.now() > data.expiresAt) { setError("Код истёк. Запросите новый."); setLoading(false); return; }
      if (data.code !== entered) { setError("Неверный код."); setLoading(false); return; }

      await setDoc(doc(db,"users",pending.uid),{phoneVerified:true},{merge:true});
      await setDoc(ref,{used:true},{merge:true});
      onLogin({uid:pending.uid, name:pending.name, phone:pending.phone, phoneVerified:true});
    } catch(e) {
      console.error(e);
      setError("Ошибка проверки. Попробуйте ещё раз.");
    }
    setLoading(false);
  };

  const resendCode = async () => {
    if (!pending) return;
    setError("");
    setLoading(true);
    try {
      const {db, doc, setDoc, serverTimestamp} = window.__fb;
      const newCode = genCode();
      await setDoc(doc(db,"verifyCodes",pending.phone),{
        code:newCode, uid:pending.uid, used:false,
        createdAt:serverTimestamp(), expiresAt: Date.now() + 10*60*1000
      });
    } catch(e) { console.error(e); setError("Не удалось отправить код."); }
    setLoading(false);
  };

  const botLink = pending ? ("https://t.me/"+TELEGRAM_BOT_USERNAME+"?start="+pending.phone) : "#";

  if (step === "verify") {
    return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
      h('div',{style:{width:"100%",maxWidth:360}},
        h('div',{style:{textAlign:"center",marginBottom:24}},
          h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"✈️"),
          h('h1',{style:{fontSize:20,fontWeight:800}},"Подтвердите номер"),
          h('p',{style:{fontSize:13,color:"#888",marginTop:4}},pending && pending.phone)
        ),
        h('div',{className:"card",style:{padding:24}},
          h('div',{style:{background:"#fafaf8",border:"1px solid #f0ece6",borderRadius:12,padding:14,marginBottom:18}},
            h('div',{style:{fontSize:12,fontWeight:700,color:"#888",marginBottom:8,textTransform:"uppercase"}},"Как получить код"),
            h('div',{style:{fontSize:13,color:"#555",lineHeight:1.8}},
              h('div',null,"1. Откройте Telegram-бота"),
              h('div',null,"2. Нажмите Старт"),
              h('div',null,"3. Бот пришлёт 6-значный код"),
              h('div',null,"4. Введите его ниже")
            )
          ),
          h('a',{
            href:botLink, target:"_blank", rel:"noopener", className:"btn-orange",
            style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:18,textDecoration:"none"}
          }, h('span',{style:{fontSize:20}},"✈️"), "Открыть Telegram-бота"),
          h('div',{style:{marginBottom:14}},
            h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Код из Telegram"),
            h('input',{className:"input-field",placeholder:"000000",value:code,inputMode:"numeric",maxLength:6,
              onChange:e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6)),
              style:{textAlign:"center",fontSize:22,fontWeight:800,letterSpacing:4}})
          ),
          error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
          h('button',{className:"btn-orange",onClick:checkCode,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,marginBottom:10,opacity:loading?0.7:1}},loading?"Проверяем...":"Подтвердить"),
          h('button',{onClick:resendCode,disabled:loading,style:{width:"100%",padding:12,borderRadius:12,border:"1px solid #e0dbd4",background:"white",fontSize:13,cursor:"pointer",marginBottom:8}},"Отправить код повторно"),
          h('button',{onClick:()=>{setStep("form");setError("");setCode("");if(unsubRef.current)unsubRef.current();},style:{width:"100%",padding:10,background:"none",border:"none",fontSize:13,color:"#aaa",cursor:"pointer"}},"← Изменить номер")
        )
      )
    );
  }

  return h('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"linear-gradient(135deg,#fdf6ec,#fef3e2)"}},
    h('div',{style:{width:"100%",maxWidth:360}},
      h('div',{style:{textAlign:"center",marginBottom:32}},
        h('div',{style:{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#e87c35,#d4611f)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:32}},"🌾"),
        h('h1',{style:{fontSize:22,fontWeight:800}},"Подработка рядом"),
        h('p',{style:{fontSize:13,color:"#888",marginTop:4}},"Бытовые задания · Павлодар")
      ),
      h('div',{className:"card",style:{padding:24}},
        h('h2',{style:{fontSize:17,fontWeight:700,marginBottom:20}},"Войти / Зарегистрироваться"),
        h('div',{style:{marginBottom:14}},
          h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Ваше имя"),
          h('input',{className:"input-field",placeholder:"Имя",value:name,onChange:e=>setName(e.target.value)})
        ),
        h('div',{style:{marginBottom:14}},
          h('label',{style:{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",display:"block",marginBottom:6}},"Номер телефона"),
          h('input',{className:"input-field",placeholder:"+7 777 000 00 00",value:phone,onChange:e=>setPhone(e.target.value),type:"tel"})
        ),
        h('div',{style:{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7a5c00",marginBottom:16}},
          "⚠️ Встречайтесь только в людных местах. Не переводите деньги незнакомым людям заранее."
        ),
        error && h('div',{style:{background:"#fff0f0",color:"#d32f2f",padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12}},error),
        h('button',{className:"btn-orange",onClick:startRegistration,disabled:loading,style:{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,opacity:loading?0.7:1}},loading?"Отправляем код...":"Продолжить →"),
        h('p',{style:{textAlign:"center",fontSize:12,color:"#aaa",marginTop:12}},"Регистрация бесплатная. Потребуется подтвердить номер в Telegram.")
      )
    )
  );
}

// ── TASK CARD ───────────────────────────────────────────
function TaskCard({task, onChat, onReport, onComplete, uid}) {
  const isOwn = task.authorUid === uid;
  const status = task.status || "open";
  const isAssignee = task.assigneeUid === uid;
  const canApply = !isOwn && status==="open";
  return h('div',{className:"card",style:{padding:16,marginBottom:12}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:8}},
      h('h3',{style:{fontWeight:700,fontSize:15,lineHeight:1.4,flex:1}},task.title),
      h('span',{style:{color:"#d4611f",fontWeight:800,fontSize:16,whiteSpace:"nowrap"}},(task.pay||0).toLocaleString("ru-RU")+" ₸")
    ),
    h('p',{className:"line-clamp2",style:{fontSize:13,color:"#666",lineHeight:1.5,marginBottom:12}},task.description),
    h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h('div',{style:{display:"flex",alignItems:"center",gap:8}},
        h('span',{style:{background:"#fef3e2",color:"#b3530d",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20}},"📍 "+task.district),
        h('span',{style:{fontSize:12,color:"#999"}},task.authorName),
        status==="in_progress" && h('span',{style:{fontSize:11,fontWeight:700,color:"#b3530d"}},"В работе")
      ),
      isOwn
        ? (status==="in_progress"
            ? h('button',{className:"btn-orange",onClick:()=>onComplete(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Работа выполнена")
            : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Ваше задание"))
        : (canApply
            ? h('div',{style:{display:"flex",gap:6}},
                h('button',{onClick:()=>onReport(task),style:{padding:"7px 10px",borderRadius:20,fontSize:11,background:"#f5f5f5",border:"none",cursor:"pointer",color:"#999"}},"🚩"),
                h('button',{className:"btn-orange",onClick:()=>onChat(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Написать")
              )
            : (isAssignee
                ? h('button',{className:"btn-orange",onClick:()=>onChat(task),style:{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700}},"Чат")
                : h('span',{style:{fontSize:11,color:"#aaa",fontStyle:"italic"}},"Занято")))
    ),
    h('div',{style:{marginTop:10,paddingTop:10,borderTop:"1px solid #f5f0ea"}},
      h('span',{style:{fontSize:11,color:"#bbb"}},timeAgo(task.createdAt))
    )
  );
}
